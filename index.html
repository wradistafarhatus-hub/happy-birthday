<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e90ff;
  text-align: center;
  color: white;
  overflow-x: hidden;
}

/* ===== ROTI JATUH ===== */
.roti {
  position: fixed;
  top: -50px;
  font-size: 20px;
  animation: jatuh linear infinite;
  opacity: 0.8;
}

@keyframes jatuh {
  from {
    transform: translateY(-50px);
  }
  to {
    transform: translateY(110vh);
  }
}

/* ===== AMBLOP ===== */
.envelope {
  width: 170px;
  margin-top: 40px;
  cursor: pointer;
  transition: 0.3s;
}

.envelope:hover {
  transform: scale(1.05);
}

/* ===== PESAN ===== */
.message {
  display: none;
  background: rgba(0,0,0,0.7);
  margin: 20px auto;
  padding: 20px;
  max-width: 650px;
  border-radius: 15px;
  line-height: 1.6;
}

/* ===== MUSIC + CASSETTE ===== */
.music-box {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
}

.cassette {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  background: #111;
  border: 3px solid white;
  position: relative;
}

.cassette::before,
.cassette::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: #444;
  border-radius: 50%;
  top: 20px;
}

.cassette::before { left: 20px; }
.cassette::after { right: 20px; }

.spin {
  animation: spin 3s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== POLAROID ===== */
.photos {
  margin-top: 20px;
}

.polaroid {
  display: inline-block;
  background: white;
  color: black;
  padding: 10px 10px 20px;
  margin: 10px;
  width: 140px;
  border-radius: 5px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
  transform: rotate(-2deg);
}

.polaroid img {
  width: 100%;
  border-radius: 3px;
}

.caption {
  margin-top: 8px;
  font-size: 12px;
  font-weight: bold;
}

/* GAMBAR */
.extra img {
  width: 200px;
  margin-top: 15px;
}
</style>
</head>

<body>

<h2>💌 Happy Birthday 💌</h2>

<!-- 🎂 ROTI JATUH -->
<div id="roti-container"></div>

<!-- 🎵 MUSIC -->
<div class="music-box">

  <div class="cassette" id="cassette"></div>

  <audio id="music" controls autoplay loop>
    <source src="1f813fc63cd925e339dc1af3d1218f3e.mp4" type="video/mp4">
  </audio>

</div>

<!-- 💌 AMBLOP -->
<img src="amplop.png" class="envelope" onclick="openMsg()">

<!-- 💌 PESAN -->
<div class="message" id="msg">

Hai demittt, distaa cuma mau bilang makasih ya udah jadi bagian dari hari-harinya distaa.

HAPPY BIRTHDAY SAYANG 🤍  
I LOVEE YOUU

</div>

<!-- 📸 POLAROID -->
<div class="photos">

  <div class="polaroid">
    <img src="IMG_20260324_153902_827.jpg">
    <div class="caption">Memory</div>
  </div>

  <div class="polaroid">
    <img src="IMG_20260425_063332_219.jpg">
    <div class="caption">Us</div>
  </div>

  <div class="polaroid">
    <img src="IMG_20260428_121429_289.jpg">
    <div class="caption">Moment</div>
  </div>

  <div class="polaroid">
    <img src="webcam-toy-photo22.jpg">
    <div class="caption">Smile</div>
  </div>

</div>

<!-- GAMBAR -->
<div class="extra">
  <img src="jepreto-regular-1777698363245.png">
</div>

<script>
function openMsg() {
  document.getElementById("msg").style.display = "block";
}

/* kaset spin */
const music = document.getElementById("music");
const cassette = document.getElementById("cassette");

music.addEventListener("play", () => {
  cassette.classList.add("spin");
});

music.addEventListener("pause", () => {
  cassette.classList.remove("spin");
});

/* 🎂 ROTI JATUH ANIMASI */
function createRoti() {
  const roti = document.createElement("div");
  roti.classList.add("roti");

  roti.innerHTML = "🎂";

  roti.style.left = Math.random() * 100 + "vw";
  roti.style.animationDuration = (Math.random() * 3 + 2) + "s";
  roti.style.fontSize = (Math.random() * 10 + 15) + "px";

  document.getElementById("roti-container").appendChild(roti);

  setTimeout(() => {
    roti.remove();
  }, 5000);
}

setInterval(createRoti, 300);
</script>

</body>
</html>
