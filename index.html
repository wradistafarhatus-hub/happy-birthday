<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.card{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    animation:fade 2s ease;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
}

img{
    width:180px;
    height:180px;
    border-radius:20px;
    object-fit:cover;
    margin-bottom:20px;
    border:3px solid white;
}

h1{
    margin-bottom:15px;
}

p{
    line-height:1.7;
    font-size:17px;
}

.heart{
    font-size:35px;
    margin-top:20px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

<img src="foto.jpg">

<h1>Happy Birthday Sayang 💙</h1>

<p>
Selamat ulang tahun cintakuuuu 🤍<br><br>

Semoga semua hal baik selalu datang ke hidup kamu.
Semoga kamu selalu sehat, bahagia, dan semua impian kamu tercapai satu per satu.<br><br>

Terima kasih sudah hadir dan jadi bagian terbaik di hidup aku.  
Aku bersyukur banget punya kamu 💙
</p>

<div class="heart">💙</div>

</div>

<audio autoplay loop>
<source src="1f813fc63cd925e339dc1af3d1218f3e.mp4" type="audio/mp3">
</audio>

</body>
</html>
