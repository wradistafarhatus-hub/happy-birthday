<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
  overflow:hidden;
  color:white;
}

/* BACKGROUND STAR */
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:1;}}

/* CARD */
.card{
  width:90%;
  max-width:420px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,0.3);
  position:relative;
  z-index:2;
  animation:fade 1s ease;
}

@keyframes fade{
  from{opacity:0; transform:scale(0.9);}
  to{opacity:1; transform:scale(1);}
}

/* ENVELOPE */
.envelope{
  font-size:80px;
  cursor:pointer;
  animation:float 2s infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.hint{font-size:14px;opacity:0.7;margin-top:10px;}

/* PAGE CONTENT */
.content{display:none;}

h1{font-size:20px;margin-bottom:10px;}

p{
  font-size:14px;
  line-height:1.6;
}

/* POLAROID */
.polaroid{
  background:white;
  padding:10px 10px 25px;
  border-radius:10px;
  margin-top:15px;
  transform:rotate(-2deg);
}
.polaroid img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}
.caption{
  color:black;
  font-size:12px;
  margin-top:5px;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#1db954;
  color:white;
  cursor:pointer;
}

/* MUSIC BOX */
.musicBox{
  margin-top:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
  font-size:13px;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:6px;
  height:6px;
  top:-10px;
  animation:fall linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

  <!-- ENVELOPE -->
  <div id="envelope" class="envelope" onclick="openCard()">
    ✉️
    <div class="hint">klik untuk membuka</div>
  </div>

  <!-- CONTENT -->
  <div id="content" class="content">

    <h1>Selamat Ulang Tahun 🤍</h1>

    <p>
      Semoga kamu selalu dikelilingi hal baik,  
      selalu diberi ketenangan, dan semua yang kamu harapkan pelan-pelan tercapai.<br><br>

      Aku nggak minta banyak,  
      cuma pengen kamu bahagia terus.
    </p>

    <p style="margin-top:10px;font-weight:bold;">
      i love you sayangg 🤍
    </p>

    <!-- POLAROID -->
    <div class="polaroid">
      <img id="img" src="">
      <div class="caption">memories ✨</div>
    </div>

    <!-- MUSIC -->
    <div class="musicBox">
      🎵 Music Player
      <br>
      <button onclick="toggleMusic()">Play / Pause</button>
    </div>

    <audio id="music" loop>
      <source src="musik.mp3" type="audio/mpeg">
    </audio>

  </div>

</div>

<script>

/* OPEN */
function openCard(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("content").style.display="block";
  startConfetti();
}

/* MUSIC */
function toggleMusic(){
  let m = document.getElementById("music");
  if(m.paused){
    m.play();
  } else {
    m.pause();
  }
}

/* IMAGE SLIDER */
let images = [
  "IMG_20260324_153902_827.jpg",
  "IMG_20260425_063332_219.jpg",
  "IMG_20260428_121429_289.jpg",
  "webcam-toy-photo22.jpg"
];

let i=0;
setInterval(()=>{
  if(document.getElementById("content").style.display=="block"){
    document.getElementById("img").src = images[i];
    i = (i+1)%images.length;
  }
},2500);

/* STARS */
for(let i=0;i<50;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  document.getElementById("stars").appendChild(s);
}

/* CONFETTI */
function startConfetti(){
  for(let i=0;i<40;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"%";
    c.style.background=["#fff","#ff0","#f0f","#0ff"][Math.floor(Math.random()*4)];
    c.style.animationDuration=(2+Math.random()*3)+"s";
    document.body.appendChild(c);
  }
}

</script>

</body>
</html>
