<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
color:white;
transition:1s;
}

.stars{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

.card{
position:relative;
z-index:2;
width:90%;
max-width:400px;
padding:30px;
border-radius:25px;
text-align:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,0.3);
animation:fade 2s ease;
}

img{
width:200px;
height:200px;
object-fit:cover;
border-radius:20px;
margin-bottom:20px;
border:3px solid white;
}

h1{
margin-bottom:15px;
font-size:30px;
}

p{
font-size:16px;
line-height:1.7;
min-height:180px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:white;
color:#1e3a8a;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.cake{
font-size:60px;
margin-top:20px;
animation:float 2s infinite;
}

.heart{
font-size:35px;
margin-top:10px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<img id="slide" src="IMG_20260324_153902_827.jpg">

<h1>Happy Birthday Sayang 💙</h1>

<p id="text"></p>

<button onclick="showLove()">Klik Aku 🎉</button>

<div class="cake">🎂</div>

<div class="heart">💙</div>

</div>

<video autoplay loop hidden>
<source src="1f813fc63cd925e339dc1af3d1218f3e.mp4" type="video/mp4">
</video>

<script>

let message = "Selamat ulang tahun cintakuuu 🤍 Semoga semua hal baik selalu datang ke hidup kamu. Semoga kamu selalu sehat, bahagia, dimudahkan semua urusannya, dan semua impian kamu tercapai satu per satu. Terima kasih sudah hadir dan jadi bagian terbaik di hidup aku 💙";

let i = 0;

function typing(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);

i++;

setTimeout(typing,50);

}

}

typing();

let images = [

"IMG_20260324_153902_827.jpg",
"IMG_20260425_063332_219.jpg",
"IMG_20260428_121429_289.jpg",
"webcam-toy-photo22.jpg"

];

let index = 0;

setInterval(function(){

index++;

if(index >= images.length){
index = 0;
}

document.getElementById("slide").src = images[index];

},2000);

for(let j=0;j<60;j++){

let star = document.createElement("div");

star.className = "star";

star.style.left = Math.random()*100 + "%";

star.style.top = Math.random()*100 + "%";

document.querySelector(".stars").appendChild(star);

}

function showLove(){

document.body.style.background =
"linear-gradient(135deg,#2563eb,#7c3aed,#ec4899)";

document.querySelector(".card").innerHTML +=
"<h2 style='margin-top:20px;'>I LOVE YOU 💙🎉</h2>";

}

</script>

</body>
</html>
